<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活科技第二專長班學科測驗刷題系統</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #66c;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .action-bar {
            position: sticky;
            top: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-restart {
            background-color: #6c757d;
        }

        .question-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-header {
            font-weight: bold;
            font-size: 1.05em;
            margin-bottom: 12px;
            color: #222;
        }

        .category-tag {
            display: inline-block;
            background: #e9ecef;
            color: #495057;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-right: 8px;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .option-label:hover {
            background-color: #f1f3f5;
        }

        .option-label input {
            margin-right: 10px;
        }

        /* 結果顯示樣式 */
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }

        .score-box {
            text-align: center;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .explanation {
            margin-top: 10px;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>生活科技第二專長班學科測驗</h1>
    <div class="subtitle">每次隨機抽選 50 題，滿分 100 分</div>

    <div class="action-bar">
        <div id="status-text">已隨機選取 50 題</div>
        <div>
            <button class="btn-restart" onclick="initQuiz()">重新抽題</button>
            <button id="submit-btn" onclick="submitQuiz()">提交答案</button>
        </div>
    </div>

    <div id="result-area"></div>
    <form id="quiz-form">
        <div id="questions-container"></div>
    </form>
</div>

<script>
// 原始題庫資料 (含解答對應)
const rawDatabase = [
    // 科技與工程教育概論
    { cat: "科技與工程教育概論", q: "1. 請問右圖高中加深加廣課程共規劃幾學分？", opts: ["(A) 2 學分。", "(B) 4 學分。", "(C) 6 學分。", "(D) 8 學分。"], ans: "D" },
    { cat: "科技與工程教育概論", q: "2. 下列何者「不屬於」生活科技「第四學習階段」（國中）之學習內容？", opts: ["(A) 科技與科學的關係。", "(B) 產品的設計與發展。", "(C) 科技與工程的關係。", "(D) 科技產業的發展。"], ans: "C" },
    { cat: "科技與工程教育概論", q: "3. 有關科技本質與科學本質之區別，下列敘述何者正確？", opts: ["(A) 科學是人類創新的舉動。", "(B) 科學重視找尋最佳的解決方案。", "(C) 科技是展現真理和事實的基本方法。", "(D) 科技是一種人類運用知識、創意和資源，以解決實務問題和改善生活環境的努力。"], ans: "D" },
    { cat: "科技與工程教育概論", q: "4. 生活科技中常用的問題解決步驟其執行順序為何？\na.蒐集資料、b.測試修正、c.界定問題、d.設計製作、e.發展方案。", opts: ["(A) a →c →e →d →b", "(B) a →b →c →d →e", "(C) c →a →e →d →b", "(D) a →b →d →c →e"], ans: "C" },
    { cat: "科技與工程教育概論", q: "5. 關於生活科技學習評量之敘述，下列何者正確？", opts: ["(A) 生活科技著重從實作中學習，因此不宜採用紙筆測驗的方式進行評量。", "(B) 科技態度方面的評量可透過教師晤談、學生自我評量與同儕互評等方式為之。", "(C) 為節省評量時間，生活科技之學習僅需評量學生最終完成之作品即可。", "(D) 操作技能之評量著重在檢視學生技能的熟練度，不需考查其工作行為習慣之改變。"], ans: "B" },
    { cat: "科技與工程教育概論", q: "6. 教師應關注學生對課程內容的深度學習。下列有關「科技與社會議題」的教學目標，何者「較難達成」高層次的認知學習結果？", opts: ["(A) 介紹手機演進的歷史年代。", "(B) 說明歷史上工業革命的起因與後續影響。", "(C) 分析臺灣近十年能源使用相關數據資料，探討臺灣能源概況。", "(D) 提出可幫助落後國家獲得乾淨飲用水的解決方法。"], ans: "A" },
    { cat: "科技與工程教育概論", q: "7. 為了應用科技促進學生進行有意義的學習(Meaningful Learning)(Ausubel, 1968)，以下針對教學或課程應達到的判斷準則之描述，何者「為非」？", opts: ["(A) 課程與教學中需能提供學生在學習中有主動積極操弄與觀察的機會。", "(B) 課程與教學中只需讓學生在學習中有能清楚說出或省察自己觀點的機會，不需提供與同儕合作的機會。", "(C) 課程與教學中需能提供學生在學習中產生自我調整學習機制(self-regulated learning)的機會。", "(D) 課程與教學中需能提供學生複雜或有情境脈絡真實(或擬真)的學習情境。"], ans: "B" },
    { cat: "科技與工程教育概論", q: "8. 以下何有關「十二年國教新課綱」之描述何者「為非」？", opts: ["(A) 科技領域獨立設領域。", "(B) 國中生活科技與資訊科技合計每週 2 節。", "(C) 高中部定必修生活科技與資訊科技各 2 學分。", "(D) 國中課程強調分科為主、跨科為輔，所以探究與實作、專題課程，只能在自然或科技領綱進行與實踐。"], ans: "D" },
    { cat: "科技與工程教育概論", q: "9. 以下針對「十二年國教新課綱」核心素養的課程教學轉化與設計，老師的課程與教學至少能夠達到哪些目標？", opts: ["(A) 連結實際的情境脈絡，讓學習產生意義。", "(B) 強調學生參與和主動學習，得以運用與強化相關能力。", "(C) 兼顧學習的內容（學習內容）與歷程（學習表現），以彰顯素養乃包含知識、技能、情意的統整能力。", "(D) 以上皆是。"], ans: "D" },
    { cat: "科技與工程教育概論", q: "10. 在國中階段的生活科技課程主要以哪一個方向為主軸？", opts: ["(A) 生活應用。", "(B) 創意設計。", "(C) 工程設計。", "(D) 運算思維。"], ans: "B" },
    { cat: "科技與工程教育概論", q: "11. 在生活科技的學習表現部分，學生能主動參與科技實作活動及職涯的試探，屬於：", opts: ["(A) 日常生活的科技知識。", "(B) 日常科技的科技態度。", "(C) 日常科技的操作技能。", "(D) 科技實作的統合能力。"], ans: "B" },
    { cat: "科技與工程教育概論", q: "12. 在生活科技的學習表現部分，學生能運用設計流程，實際設計並製作科技產品以解決問題，屬於：", opts: ["(A) 日常生活的科技知識。", "(B) 日常科技的科技態度。", "(C) 日常科技的操作技能。", "(D) 科技實作的統合能力。"], ans: "D" },
    { cat: "科技與工程教育概論", q: "13. 在生活科技的學習內容部分，介紹科技產品保養與維護、機構與結構的設計、機電整合的原理與應用等內涵，屬於：", opts: ["(A) 科技的本質。", "(B) 設計與製作。", "(C) 科技的應用。", "(D) 科技與社會。"], ans: "C" },
    { cat: "科技與工程教育概論", q: "14. 陳老師設計了一個 USB 玻璃瓶動物燈座的活動，主要希望學生能夠學習產品設計、應用簡單電子電路等內容，請問若依據科技領域課程綱要的學習內容規劃，此一學習活動較適合哪一個年級的學生？", opts: ["(A) 國中七年級。", "(B) 國中八年級。", "(C) 國中九年級。", "(D) 高中一年級。"], ans: "C" },
    { cat: "科技與工程教育概論", q: "15. 下列有關科學與科技的比較，何者正確？", opts: ["(A) 科技主要研究主題是如何改善人類生活問題。", "(B) 科學研究的目的是滿足人的需求與慾望。", "(C) 科學強調使用的能力。", "(D) 科技強調理論的驗證。"], ans: "A" },
    { cat: "科技與工程教育概論", q: "16. 在生活科技的學習表現部分，包含本質演進、科技概念、科技程序、影響評估等項目，屬於？", opts: ["(A) 科技知識。", "(B) 科技態度。", "(C) 操作技能。", "(D) 統合能力。"], ans: "A" },
    { cat: "科技與工程教育概論", q: "17. 在生活科技的學習內容部分，介紹設計/工程設計/解決問題流程、製圖與識圖、材料選用及常用機具操作等內涵，屬於？", opts: ["(A) 科技的本質。", "(B) 設計與製作。", "(C) 科技的應用。", "(D) 科技與社會。"], ans: "B" },
    { cat: "科技與工程教育概論", q: "18. 依據科技領域課程綱要的規劃，下列哪一項學習內容「並非」規劃於七年級實施？", opts: ["(A) 創意思考的方法。", "(B) 設計的流程。", "(C) 日常科技產品的選用。", "(D) 科技與社會的互動關係。"], ans: "B" },

    // 基本設計
    { cat: "基本設計", q: "1. 設計必須具有清楚的目的、適切的過程與有效的結果，因此下列陳述何者「非」必要條件？", opts: ["(A) 設計產品必須提供正確資訊使生活更美好。", "(B) 設計產品必須美觀、好用、方便、便宜。", "(C) 設計產品必須具備審美佳、機能佳、經濟性。", "(D) 設計產品必須讓設計師自由表達情感。"], ans: "D" },
    { cat: "基本設計", q: "2. 下列有關「設計」的敘述何者是「錯誤」的？", opts: ["(A) 凡是造形活動都可以說是設計。", "(B) 設計是有目的、有計畫的創造活動。", "(C) 設計是為了某一特定目的，將某些原創性的觀念，以有組織的表達，使之具體化。", "(D) 設計是將人為環境規劃造成符合人類、社會、生理及心理需求的過程。"], ans: "A" },
    { cat: "基本設計", q: "3. 同樣的形式，作層次性的重複出現在相鄰的時間或空間，稱為：", opts: ["(A) 反覆", "(B) 對稱", "(C) 對比", "(D) 均衡"], ans: "A" },
    { cat: "基本設計", q: "4. 以大象為藍本設計商標，此設計形態為：", opts: ["(A) 具象形", "(B) 抽象形", "(C) 幾何形", "(D) 偶然形"], ans: "A" },
    { cat: "基本設計", q: "5. 葉夏（Escher, M. C.）Sky-and-Water 的錯視圖形是應用哪一種設計觀念？", opts: ["(A) 無理圖形", "(B) 矛盾圖形", "(C) 圖地反轉", "(D) 多義圖形"], ans: "C" },
    { cat: "基本設計", q: "6. 同一色相的色彩，分別置於相同色相、不同彩度之色彩上，色彩會產生「遇強則弱，欲弱則強」的對比現象，這是屬於：", opts: ["(A) 彩度對比", "(B) 面積對比", "(C) 色相對比", "(D) 補色對比"], ans: "A" },
    { cat: "基本設計", q: "7. 就色彩而言，視網膜也有平衡作用，視網膜會透過補色關係來保持平衡。例如，紅色看久了就會出現以下何種補色？", opts: ["(A) 粉紅色", "(B) 綠色", "(C) 紫色", "(D) 橘色"], ans: "B" },
    { cat: "基本設計", q: "8. 人類對於美的感覺是源於下列何者？", opts: ["(A) 藝術家才具有的。", "(B) 個人主觀的審美觀。", "(C) 需受過訓練才具有的。", "(D) 人類主觀或客觀一致的理念。"], ans: "D" },
    { cat: "基本設計", q: "9. 色彩的三屬性：", opts: ["(A) 彩度、亮度、色溫", "(B) 顏料、混色、深淺", "(C) 色相、明度、彩度", "(D) 暖色、寒色、中性色"], ans: "C" },
    { cat: "基本設計", q: "10. 平面造形元素中，點、面的差異在於：", opts: ["(A) 重量", "(B) 形狀", "(C) 質感", "(D) 面積比"], ans: "D" },
    { cat: "基本設計", q: "11. 下列敘述何者為正確：", opts: ["(A) 色光三原色：紅、黃、藍為加法混合", "(B) 色光三原色：紅、黃、藍為減法混合", "(C) 色光三原色：紅、綠、藍為加法混合", "(D) 色光三原色：紅、綠、藍為減法混合"], ans: "C" },
    { cat: "基本設計", q: "12. 印刷時色料 4 原色是指：", opts: ["(A) 紅、綠、藍、黑", "(B) 紅、綠、黃、黑", "(C) 青、洋紅、黃、黑", "(D) 青、洋紅、黃、藍"], ans: "C" },
    { cat: "基本設計", q: "13. 圖與背景之色彩，會因兩色的色相差、明度差、彩度差、面積及距離的關係，而產生不容易看清楚的差別，稱之為：", opts: ["(A) 清晰度", "(B) 明亮度", "(C) 明視度", "(D) 透明度"], ans: "C" },
    { cat: "基本設計", q: "14. 表示物體的形狀或輪廓是以「」表示？", opts: ["(A) 實線", "(B) 投影線", "(C) 細實線", "(D) 尺寸線"], ans: "A" },
    { cat: "基本設計", q: "15. 家具製圖上常以「」來表示較複雜的內部構造？", opts: ["(A) 立體圖", "(B) 草圖", "(C) 剖視圖", "(D) 透視圖"], ans: "C" },
    { cat: "基本設計", q: "16. 以下敘述何者「錯誤」？", opts: ["(A) 細直線具有神經質、尖銳的感覺", "(B) 水平線具有平穩、安定、增寬之感", "(C) 鋸狀直線具有神經質、尖銳之感", "(D) 曲線具有男性力強的陽剛性格"], ans: "D" },
    { cat: "基本設計", q: "17. 造形上要表現律動感，最基本的兩種表現形式為：", opts: ["(A) 統一、對比", "(B) 反覆、對稱", "(C) 反覆、漸變", "(D) 調和、比例"], ans: "C" },
    { cat: "基本設計", q: "18. 中國指美的石頭應該具備，皺、瘦、透。請問「透」指的是：", opts: ["(A) 圖形對比", "(B) 漏水", "(C) 圖地反轉", "(D) 虛空間"], ans: "D" },
    { cat: "基本設計", q: "19. 剖面線上之箭頭用以表示：", opts: ["(A) 切割之方向", "(B) 畫剖面線之斜度方向", "(C) 應注意之方向", "(D) 視線之方向"], ans: "D" },
    { cat: "基本設計", q: "20. 製圖比例如 1/2 即表示：", opts: ["(A) 放大兩倍", "(B) 縮小一半", "(C) 放大 1/2 倍", "(D) 縮小為原來的 1/4"], ans: "B" },
    { cat: "基本設計", q: "21. 在正投影中，上大下小的圓錐體，在俯視圖上的線條是：", opts: ["(A) 兩條虛線", "(B) 兩條實線", "(C) 內虛線外實線", "(D) 內實線外虛線"], ans: "C" },
    { cat: "基本設計", q: "22. 「能運用設計流程，實際設計並製作科技產品以解決問題」是屬於生活科技何種學習表現？", opts: ["(A) 科技知識", "(B) 日常科技的使用態度", "(C) 日常科技的操作技能", "(D) 科技實作的統合能力"], ans: "D" },

    { cat: "科技教室規畫與管理", q: "2. 下列何者是較為適切之生活科技專科教室插座迴路數量？", opts: ["(A) 1", "(B) 6-8", "(C) 10-12", "(D) 14-16"], ans: "B" },
    { cat: "科技教室規畫與管理", q: "3. 為了減少生活科技專科教室粉塵過多問題，木料加工時適合搭配何種機器協助(集)排塵？", opts: ["(A) 滅火器", "(B) 電風扇", "(C) 吸塵器", "(D) 抽油煙機"], ans: "C" },
    { cat: "科技教室規畫與管理", q: "4. 下列何者為生活科技專科教室電力配置規劃多條迴路的目的？", opts: ["(A) 進行設備管理", "(B) 分散電流，減輕電線負荷", "(C) 方便秩序控管", "(D) 以上皆是"], ans: "D" },
    { cat: "科技教室規畫與管理", q: "5. 下列何者為生活科技專科教室的安全設備？", opts: ["(A) 耳罩", "(B) 滅火器", "(C) 緊急斷電裝置", "(D) 以上皆是"], ans: "D" },
    { cat: "科技教室規畫與管理", q: "6. 生活科技專科教室使用的注意事項，下列何者「為非」？", opts: ["(A) 因為學生會使用機器，所以老師不在時學生也可以使用", "(B) 每台機器一次只能一個人用", "(C) 頭髮及袖子應該捲起，以免遭機器捲入", "(D) 使用機器前應配戴護目鏡"], ans: "A" },
    { cat: "科技教室規畫與管理", q: "7. 在規劃生活科技專科教室時，首要的步驟應為何？", opts: ["(A) 購買適當的機具", "(B) 爭取經費", "(C) 量測教室大小", "(D) 思考教什麼、需要什麼"], ans: "D" },
    { cat: "科技教室規畫與管理", q: "8. 依教學需要，於生活科技專科教室內應妥善設置教學區、工作區、小組討論區、教師研究區（室）、儲藏區（室）、展示區（室）等，哪些區（室）得合併規劃？", opts: ["(A) 儲藏區（室）、展示區（室），得規劃為同一空間", "(B) 教師研究區（室）、儲藏區（室）、展示區（室），得規劃為同一空間", "(C) 教學區、教師研究區（室）、儲藏區（室），得規劃為同一空間", "(D) 教學區、小組討論區，得規劃為同一空間"], ans: "D" },
    { cat: "科技教室規畫與管理", q: "9. 生活科技專科教室的安全檢查最基本的依據是？", opts: ["(A) 安全法令", "(B) 安全標準", "(C) 個人經驗", "(D) 工廠要求"], ans: "A" },
    { cat: "科技教室規畫與管理", q: "10. 安全檢查制度的好壞及執行的態度嚴格與否，造成的影響為？", opts: ["(A) 降低成本", "(B) 降低事故", "(C) 降低工作效率", "(D) 降低工作熱忱"], ans: "B" },
    { cat: "科技教室規畫與管理", q: "11. 生活科技專科教室實施安全檢查最佳時機是：", opts: ["(A) 即將發生危險事故時", "(B) 已經發生事故，但尚無人傷亡時", "(C) 每次上課開始操作前", "(D) 工作場所下課時"], ans: "C" },
    { cat: "科技教室規畫與管理", q: "12. 生活科技專科教室實施工作安全分析時，最優先考慮選擇的工作項目為：", opts: ["(A) 具潛在危險的工作", "(B) 全新工作", "(C) 曾發生失能傷害的工作", "(D) 傷害頻率最高者"], ans: "C" },
    { cat: "科技教室規畫與管理", q: "13. 生活科技教室容易產生大量噪音，對上課的學生而言，最好之噪音危害預防措施為下列何者？", opts: ["(A) 工程改善", "(B) 戴耳罩", "(C) 教育訓練", "(D) 標示注意"], ans: "A" },
    { cat: "科技教室規畫與管理", q: "14. 考慮正常使用頻率，下列哪種器具的粉塵量最高？", opts: ["(A) 圓盤鋸", "(B) 曲線鋸機", "(C) 鑽孔機", "(D) 砂帶機"], ans: "D" },
    { cat: "科技教室規畫與管理", q: "15. 一般教室改設為生活科技專科教室，下列何者是經常發生且至為重要的議題？", opts: ["(A) 照明系統", "(B) 消防設備", "(C) 電力系統", "(D) 給排水設備"], ans: "C" },
    { cat: "科技教室規畫與管理", q: "16. 下列何種電力需求為生活科技專科教室最關鍵處？", opts: ["(A) 照明 110V", "(B) 插座 110V", "(C) 插座 220V", "(D) 弱電資通系統"], ans: "C" },
    { cat: "科技教室規畫與管理", q: "17. 要使用曲線鋸機切木料，在安裝鋸條時，應將鋸條尖銳的鋸齒方向面向何處？", opts: ["(A) 朝向使用者且鋸齒向上", "(B) 朝向使用者且鋸齒向下", "(C) 背向使用者且鋸齒向上", "(D) 背向使用者且鋸齒向下"], ans: "B" },
    { cat: "科技教室規畫與管理", q: "18. 阿仁師前往商家購買曲線鋸機用的鋸條，請問下列哪一型號鋸條鋸齒最細？", opts: ["(A) 16T", "(B) 18T", "(C) 20T", "(D) 25T"], ans: "D" },

    // 科技系統與社會發展
    { cat: "科技系統與社會發展", q: "1. 科技系統的運作包含目標、輸入、處理、輸出以及回饋等要素，請問下列何者「不屬於」輸入要素的內涵？", opts: ["(A) 人力、知識。", "(B) 設備、材料。", "(C) 資金、時間。", "(D) 問題、需求。"], ans: "D" },
    { cat: "科技系統與社會發展", q: "2. 什麼是科技革命（technological revolution）？", opts: ["(A) 指新科技徹底改變生活和文化的時期。", "(B) 指任何新科技被創造的時期。", "(C) 指沒有科技被發明的時期。", "(D) 指因為科技而造成革命產生的時期。"], ans: "A" },
    { cat: "科技系統與社會發展", q: "3. 依據科技領域課程綱要，下列關於「科技的系統」此項學習內容之說明，何者正確？", opts: ["(A) 科技的系統著重於教導學生界定問題、蒐集資訊、發展方案、設計製作、測試修正等歷程。", "(B) 科技系統的組成包含輸入、處理、輸出、回饋等歷程。", "(C) 科技系統是指控制自走車時 Arduino 所安裝的程式。", "(D) 科技的系統著重於教導學生了解影響科技演進的關鍵因素。"], ans: "B" },
    { cat: "科技系統與社會發展", q: "4. 教師應關注學生對課程內容的深度學習。下列有關「科技與社會議題」的教學目標，何者較難達成高層次的認知學習結果？", opts: ["(A) 介紹手機演進的歷史年代。", "(B) 說明歷史上工業革命的起因與後續影響。", "(C) 分析臺灣近十年能源使用相關數據資料，探討臺灣能源概況。", "(D) 提出可幫助落後國家獲得乾淨飲用水的解決方法。"], ans: "A" },
    { cat: "科技系統與社會發展", q: "5. 透過科技發展史可以協助學生思考與探討科技與社會互動的關聯，有位生活科技教師採用手機為例引導學生進行一系列的科技與社會之學習活動，請問下列敘述何者「較不適切」？", opts: ["(A) 透過編碼、解碼、傳送、接收、儲存、取出來引導學生思考手機的運作系統。", "(B) 引導學生思考當使用手機進行導航，結果發生導航資訊錯誤時，所可能產生此一問題的原因。", "(C) 引導學生針對國高中校園中是否應開放自由使用手機的議題進行辯論。", "(D) 教導學生使用手機進行 micro.bit 程式編碼，並據此進行濕度感測實驗。"], ans: "D" },
    { cat: "科技系統與社會發展", q: "6. 科技效能改善率和科技在市場上的採用率，會呈現 S 型曲線的模式，下列敘述何者「錯誤」？", opts: ["(A) 科技效能的改善都是呈現平緩的狀況。", "(B) 科技獲得認同與正統性，才會引其他開發人員的投入。", "(C) 在某些狀況下，研發投入的報酬減少，每單位的邊際改善成本就會增加，此時 S 型曲線會趨於平緩。", "(D) 並非所有的科技都有機會達到極限。"], ans: "A" },
    { cat: "科技系統與社會發展", q: "7. 不連續科技是藉由建立一個全新的知識基礎，以滿足相似市場需求的新興科技，下列敘述何者「錯誤」？", opts: ["(A) 某一新科技能滿足相似的市場需求，卻由全新的知識基礎組成，此時創新就是不連續的。", "(B) 鹵化銀照技術到數位照相，就是不連續性的。", "(C) 不連續性科技一開始的效能就是比當代科技的好。", "(D) 黑膠技術到雷射唱片，就是不連續性的。"], ans: "C" },
    { cat: "科技系統與社會發展", q: "8. 下列對科技(technology)的描述何者「不正確」?", opts: ["(A) 是由實踐所產生或製造的物質工具、設備或人工物。", "(B) 可以包括科技知識、規則、秘訣、或概念。", "(C) 是人創造力的表現。", "(D) 強調對現象的假設、驗證與推演，做出價值中立的陳述。"], ans: "D" },
    { cat: "科技系統與社會發展", q: "9. 永續發展的定義是下列何者？", opts: ["(A) 滿足當代人民需求，同時不損及後代子孫滿足其需求能力之發展。", "(B) 積極支持夥伴，共同發起、支持社會上與經濟上可持續進行的發展計畫。", "(C) 減少二氧化碳的排放量，使人類和地球共創美好福祉。", "(D) 顧及未來的福祉，發展駕馭地球生態的科技。"], ans: "A" },
    { cat: "科技系統與社會發展", q: "10. 在科技系統中的哪一個要素，會涉及有關人力、知識、設備、材料、資金以及時間？", opts: ["(A) 輸入。", "(B) 處理。", "(C) 輸出。", "(D) 回饋。"], ans: "A" },
    { cat: "科技系統與社會發展", q: "11. 關於技術群聚(technology clusters)的敘述，下列途述何者「錯誤」？", opts: ["(A) 地理上接近性仍扮演重要角色，如新竹科學園區。", "(B) 群聚是透過供應商、顧客及互補廠商間之關係所形成的一系列的產業。", "(C) 鄰近及互動能直接影響公司交換知識的能力及意願。", "(D) 技術外溢(technological spillovers)起源於跨組織或區域的知識擴散的研發，所帶來的負向外部利益。"], ans: "D" },
    { cat: "科技系統與社會發展", q: "12. 探討科技的發展與影響時，下列哪一種跨領域的論點會涉及到科技與性別、科技與政治？", opts: ["(A) Science, Technology, Engineer, Mathematics (STEM)", "(B) Science, Technology, Mathematics (STM)", "(C) Science, Technology, Society (STS)", "(D) Science, Technology (ST)"], ans: "C" },
    { cat: "科技系統與社會發展", q: "13. 「科技有其自身的內在邏輯和規律的發展，會對人的思想和社會狀況產生決定和支配的作用」，此論點是屬於何種觀點的論述？", opts: ["(A) 社會決定論", "(B) 科技決定論", "(C) 科技社會互動論", "(D) 科技悲觀主義"], ans: "B" },
    { cat: "科技系統與社會發展", q: "14. 下列何種科技產品發明的時間最早？", opts: ["(A) 真空管", "(B) 電視", "(C) 柴油引擎", "(D) 抗生素"], ans: "C" },
    { cat: "科技系統與社會發展", q: "15. 抗生素的發明，使人們可以對抗病毒侵略，是一種醫藥的重大突破，感覺是很好的技術物，為何會產生倫理問題？", opts: ["(A) 科學家製造抗生素的方式不同", "(B) 抗生素尚未獲得科學家一致的認同", "(C) 抗生素的藥性不穩定", "(D) 人們使用的態度及價值觀不同"], ans: "D" },
    { cat: "科技系統與社會發展", q: "16. 科技系統與社會發展的教學，運用 STS 教學方式切入，以學生日常生活中或社會上所發生與科技有關之問題為主題，帶領學生從不同面向思考科技與社會之間的互動關係，是科學教育朝專業化走向後的反省思考。其中，STS 各代表：", opts: ["(A) 科學 Science、科技 Technology、社會 Society", "(B) 科學 Science、教學 Teaching、社會 Society", "(C) 系統 System、教學 Teaching、標準 Standard", "(D) 標準 Standard、科技 Technology、系統 System"], ans: "A" },
    { cat: "科技系統與社會發展", q: "17. 依據 ITEEA（2020）所發布之 Standards for Technological and Engineering Literacy，其對於科技系統核心概念之敘述，何者「錯誤」？", opts: ["(A) 系統是一組相互關聯的組件，它們被設計為一個整體以協同實現預期目標。", "(B) 科技系統中的輸入（inputs）包括：工具、機器、設備、材料、資金、知識、能源、時間和人員。", "(C) 處理程序（process）是用於產生輸出的一系列系統性的動作。", "(D) 回饋（Feedback）是在開發過程中設計人員必須考量的限制、標準或約束。"], ans: "D" },
    { cat: "科技系統與社會發展", q: "18. 秦先玉（2013）指出「電鍋的製造始於日本，終於在台灣高度使用」，電鍋從日本傳入臺灣以後，由臺灣的工程師依據臺灣本地的需求與環境進行了不同的創新與改良，進而發展出一個廣受民眾歡迎的產品，甚至一度在來台觀光的遊客中形成了購買的風潮。此一案例，最適合運用何種科技與社會理論進行探討？", opts: ["(A) 大型科技系統（Large technical systems, LTS）", "(B) 科技的社會建構（Social construction of technology, SCOT）", "(C) 科技決定論（Technological determinism）", "(D) 行動者－網絡理論（Actor-network theory , ANT）"], ans: "B" },

    // 工程設計
    { cat: "工程設計", q: "1. 下列哪一項學習表現「並非」必修以及加深加廣選修共用的學習表現？", opts: ["(A) 能了解工程與工程設計的基本知識。", "(B) 能主動探索科技新知。", "(C) 能運用繪圖軟體或相關科技以表達設計構想。", "(D) 能具備與人溝通、協調、合作的能力。"], ans: "B" },
    { cat: "工程設計", q: "2. 某位高中科技教師想要以資源回收裝置作為是必修課程的專題製作活動，請問在規劃此一活動時，將下列哪一項學習內容納入「較不適切」？", opts: ["(A) 工程、科技、科學與數學的統整與應用。", "(B) 進階機電整合設計與實作。", "(C) 機構與結構的設計與應用。", "(D) 工程科技議題的探究。"], ans: "B" },
    { cat: "工程設計", q: "3. 工程師必須了解需求和限制之間的差異，倘若有一群工程師被要求設計一雙孩童用的網球鞋，且金額必須低於 1000 元新台幣。他們決定若要生產與製造低於 1000 元新台幣的球鞋，那麼一定必須使用回收材料。請問，下列哪一項是這個工程團隊所遭遇的限制？", opts: ["(A) 鞋子必須專門為孩童設計。", "(B) 鞋子必須使用回收材料。", "(C) 鞋子價格必須低於新台幣 1000 元。", "(D) 鞋子必須由這群工程師團隊設計與製造。"], ans: "C" },
    { cat: "工程設計", q: "4. 當針對某一個工程設計問題尋找可能的解決方法時，通常會發生什麼情形，請挑選適切的選項？", opts: ["(A) 只有一個可能正確的解決方法。", "(B) 只會有非常少數且有限制的可能解決方法。", "(C) 通常會有許多可能的解決方法。", "(D) 不會有適切的解決方法。"], ans: "C" },
    { cat: "工程設計", q: "5. 通常工程師在設計產品時主要目的為何，請挑選出較爲適切者。", opts: ["(A) 科學是人類創新的舉動。", "(B) 科學重視找尋最佳的解決方案。", "(C) 科技是展現真理和事實的基本方法。", "(D) 科技是一種人類運用知識、創意和資源，以解決實務問題和改善生活環境的努力。"], ans: "D" },
    { cat: "工程設計", q: "6. 下列哪一個選項常被用來評估一項設計的品質？", opts: ["(A) 建模測試的次數。", "(B) 螺旋式的設計程序。", "(C) 標準與限制。", "(D) 工程公司的規模。"], ans: "C" },
    { cat: "工程設計", q: "7. 當一個工程師設計和建造一個改善汽車煞車系統的模型之後，請問工程師接下來應該採取哪一個步驟？", opts: ["(A) 確認需求與限制。", "(B) 繪製建模草圖。", "(C) 測試建模並蒐集與分析結果。", "(D) 溝通與優化設計。"], ans: "C" },

let currentQuiz = [];

// 洗牌演算法 (Fisher-Yates Shuffle)
function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    const newArray = [...array];
    while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [newArray[currentIndex], newArray[randomIndex]] = [newArray[randomIndex], newArray[currentIndex]];
    }
    return newArray;
}

// 初始化/抽題
function initQuiz() {
    const shuffled = shuffle(rawDatabase);
    currentQuiz = shuffled.slice(0, 50); // 隨機抽 50 題

    const container = document.getElementById('questions-container');
    container.innerHTML = '';
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('submit-btn').style.display = 'inline-block';
    
    // 捲動到頂部
    window.scrollTo({ top: 0, behavior: 'smooth' });

    currentQuiz.forEach((qObj, index) => {
        const qCard = document.createElement('div');
        qCard.className = 'question-card';
        qCard.id = `q-card-${index}`;

        let optionsHtml = '';
        const optKeys = ['A', 'B', 'C', 'D'];
        qObj.opts.forEach((optStr, optIdx) => {
            const key = optKeys[optIdx];
            optionsHtml += `
                <label class="option-label" id="label-${index}-${key}">
                    <input type="radio" name="q-${index}" value="${key}">
                    ${optStr}
                </label>
            `;
        });

        qCard.innerHTML = `
            <div class="question-header">
                <span class="category-tag">${qObj.cat}</span>
                第 ${index + 1} 題. ${qObj.q.replace(/^\d+\.\s*/, '')}
            </div>
            <div class="options-group">
                ${optionsHtml}
            </div>
            <div class="explanation" id="exp-${index}"></div>
        `;
        container.appendChild(qCard);
    });
}

// 提交計算分數
function submitQuiz() {
    let score = 0;
    let answeredCount = 0;

    currentQuiz.forEach((qObj, index) => {
        const selected = document.querySelector(`input[name="q-${index}"]:checked`);
        const expDiv = document.getElementById(`exp-${index}`);
        
        if (selected) {
            answeredCount++;
            const userAns = selected.value;
            
            if (userAns === qObj.ans) {
                score += 2; // 每題 2 分，共 100 分
                document.getElementById(`label-${index}-${userAns}`).classList.add('correct');
                expDiv.innerHTML = `<span style="color:var(--success-color)">✓ 回答正確</span>`;
            } else {
                document.getElementById(`label-${index}-${userAns}`).classList.add('incorrect');
                document.getElementById(`label-${index}-${qObj.ans}`).classList.add('correct');
                expDiv.innerHTML = `<span style="color:var(--danger-color)">✗ 回答錯誤！正確答案為 (${qObj.ans})</span>`;
            }
        } else {
            document.getElementById(`label-${index}-${qObj.ans}`).classList.add('correct');
            expDiv.innerHTML = `<span style="color:var(--danger-color)">未作答！正確答案為 (${qObj.ans})</span>`;
        }

        // 鎖定所有選項
        const inputs = document.querySelectorAll(`input[name="q-${index}"]`);
        inputs.forEach(input => input.disabled = true);
    });

    // 顯示成果
    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `
        <div class="score-box">
            測驗結束！您的總分為：<span style="color:var(--primary-color); font-size: 1.5em;">${score}</span> / 100 分
            <br>
            <span style="font-size:0.8em; font-weight:normal; color:#666;">
                (共 50 題，已答 ${answeredCount} 題，答對 ${score/2} 題)
            </span>
        </div>
    `;

    document.getElementById('submit-btn').style.display = 'none';
    resultArea.scrollIntoView({ behavior: 'smooth' });
}

// 頁面載入時自動初始化
window.onload = initQuiz;
</script>
