    { cat: "科技與工程教育概論", q: "12. 在生活科技的學習表現部分，學生能運用設計流程，實際設計並製作科技產品以解決問題，屬於：", opts: ["日常生活的科技知識。", "日常科技的科技態度。", "日常科技的操作技能。", "科技實作的統合能力。"], ansIndex: 3 },

    { cat: "科技系統與社會發展", q: "3. 依據科技領域課程綱要，下列關於「科技的系統」此項學習內容之說明，何者正確？", opts: ["科技的系統著重於教導學生界定問題、蒐集資訊、發展方案、設計製作、測試修正等歷程。", "科技系統的組成包含輸入、處理、輸出、回饋等歷程。", "科技系統是指控制自走車時 Arduino 所安裝的程式。", "科技的系統著重於教導學生了解影響科技演進的關鍵因素。"], ansIndex: 1 },
    { cat: "科技系統與社會發展", q: "4. 教師應關注學生對課程內容的深度學習。下列有關「科技與社會議題」的教學目標，何者較難達成高層次的認知學習結果？", opts: ["介紹手機演進的歷史年代。", "說明歷史上工業革命的起因與後續影響。", "分析臺灣近十年能源使用相關數據資料，探討臺灣能源概況。", "提出可幫助落後國家獲得乾淨飲用水的解決方法。"], ansIndex: 0 },
    { cat: "科技系統與社會發展", q: "5. 透過科技發展史可以協助學生思考與探討科技與社會互動的關聯，有位生活科技教師採用手機為例引導學生進行一系列的科技與社會之學習活動，請問下列敘述何者「較不適切」？", opts: ["透過編碼、解碼、傳送、接收、儲存、取出來引導學生思考手機的運作系統。", "引導學生思考當使用手機進行導航，結果發生導航資訊錯誤時，所可能產生此一問題的原因。", "引導學生針對國高中校園中是否應開放自由使用手機的議題進行辯論。", "教導學生使用手機進行 micro.bit 程式編碼，並據此進行濕度感測實驗。"], ansIndex: 3 },
    { cat: "科技系統與社會發展", q: "6. 科技效能改善率和科技在市場上的採用率，會呈現 S 型曲線的模式，下列敘述何者「錯誤」？", opts: ["科技效能的改善都是呈現平緩的狀況。", "科技獲得認同與正統性，才會引其他開發人員的投入。", "在某些狀況下，研發投入的報酬減少，每單位的邊際改善成本就會增加，此時 S 型曲線會趨於平緩。", "並非所有的科技都有機會達到極限。"], ansIndex: 0 },
    { cat: "科技系統與社會發展", q: "7. 不連續科技是藉由建立一個全新的知識基礎，以滿足相似市場需求的新興科技，下列敘述何者「錯誤」？", opts: ["某一新科技能滿足相似的市場需求，卻由全新的知識基礎組成，此時創新就是不連續的。", "鹵化銀照技術到數位照相，就是不連續性的。", "不連續性科技一開始的效能就是比當代科技的好。", "黑膠技術到雷射唱片，就是不連續性的。"], ansIndex: 2 },
    { cat: "科技系統與社會發展", q: "8. 下列對科技(technology)的描述何者「不正確」?", opts: ["是由實踐所產生或製造的物質工具、設備或人工物。", "可以包括科技知識、規則、秘訣、或概念。", "是人創造力的表現。", "強調對現象的假設、驗證與推演，做出價值中立的陳述。"], ansIndex: 3 },
    { cat: "科技系統與社會發展", q: "9. 永續發展的定義是下列何者？", opts: ["滿足當代人民需求，同時不損及後代子孫滿足其需求能力之發展。", "積極支持夥伴，共同發起、支持社會上與經濟上可持續進行的發展計畫。", "減少二氧化碳的排放量，使人類和地球共創美好福祉。", "顧及未來的福祉，發展駕馭地球生態的科技。"], ansIndex: 0 },
    { cat: "科技系統與社會發展", q: "10. 在科技系統中的哪一個要素，會涉及有關人力、知識、設備、材料、資金以及時間？", opts: ["輸入。", "處理。", "輸出。", "回饋。"], ansIndex: 0 },
    { cat: "科技系統與社會發展", q: "11. 關於技術群聚(technology clusters)的敘述，下列途述何者「錯誤」？", opts: ["地理上接近性仍扮演重要角色，如新竹科學園區。", "群聚是透過供應商、顧客及互補廠商間之關係所形成的一系列的產業。", "鄰近及互動能直接影響公司交換知識的能力及意願。", "技術外溢(technological spillovers)起源於跨組織或區域的知識擴散的研發，所帶來的負向外部利益。"], ansIndex: 3 },
    { cat: "科技系統與社會發展", q: "12. 探討科技的發展與影響時，下列哪一種跨領域的論點會涉及到科技與性別、科技與政治？", opts: ["Science, Technology, Engineer, Mathematics (STEM)", "Science, Technology, Mathematics (STM)", "Science, Technology, Society (STS)", "Science, Technology (ST)"], ansIndex: 2 },
    { cat: "科技系統與社會發展", q: "13. 「科技有其自身的內在邏輯和規律的發展，會對人的思想和社會狀況產生決定和支配的作用」，此論點是屬於何種觀點的論述？", opts: ["社會決定論", "科技決定論", "科技社會互動論", "科技悲觀主義"], ansIndex: 1 },
    { cat: "科技系統與社會發展", q: "14. 下列何種科技產品發明的時間最早？", opts: ["真空管", "電視", "柴油引擎", "抗生素"], ansIndex: 2 },
    { cat: "科技系統與社會發展", q: "15. 抗生素的發明，使人們可以對抗病毒侵略，是一種醫藥的重大突破，感覺是很好的技術物，為何會產生倫理問題？", opts: ["科學家製造抗生素的方式不同", "抗生素尚未獲得科學家一致的認同", "抗生素的藥性不穩定", "人們使用的態度及價值觀不同"], ansIndex: 3 },
    { cat: "科技系統與社會發展", q: "16. 科技系統與社會發展的教學，運用 STS 教學方式切入，以學生日常生活中或社會上所發生與科技有關之問題為主題，帶領學生從不同面向思考科技與社會之間的互動關係，是科學教育朝專業化走向後的反省思考。其中，STS 各代表：", opts: ["科學 Science、科技 Technology、社會 Society", "科學 Science、教學 Teaching、社會 Society", "系統 System、教學 Teaching、標準 Standard", "標準 Standard、科技 Technology、系統 System"], ansIndex: 0 },
    { cat: "科技系統與社會發展", q: "17. 依據 ITEEA（2020）所發布之 Standards for Technological and Engineering Literacy，其對於科技系統核心概念之敘述，何者「錯誤」？", opts: ["系統是一組相互關聯的組件，它們被設計為一個整體以協同實現預期目標。", "科技系統中的輸入（inputs）包括：工具、機器、設備、材料、資金、知識、能源、時間和人員。", "處理程序（process）是用於產生輸出的一系列系統性的動作。", "回饋（Feedback）是在開發過程中設計人員必須考量的限制、標準或約束。"], ansIndex: 3 },
    { cat: "科技系統與社會發展", q: "18. 秦先玉（2013）指出「電鍋的製造始於日本，終於在台灣高度使用」，電鍋從日本傳入臺灣以後，由臺灣的工程師依據臺灣本地的需求與環境進行了不同的創新與改良，進而發展出一個廣受民眾歡迎的產品，甚至一度在來台觀光的遊客中形成了購買的風潮。此一案例，最適合運用何種科技與社會理論進行探討？", opts: ["大型科技系統（Large technical systems, LTS）", "科技的社會建構（Social construction of technology, SCOT）", "科技決定論（Technological determinism）", "行動者－網絡理論（Actor-network theory , ANT）"], ansIndex: 1 },

    // 工程設計
    { cat: "工程設計", q: "1. 下列哪一項學習表現「並非」必修以及加深加廣選修共用的學習表現？", opts: ["能了解工程與工程設計的基本知識。", "能主動探索科技新知。", "能運用繪圖軟體或相關科技以表達設計構想。", "能具備與人溝通、協調、合作的能力。"], ansIndex: 3 },
    { cat: "工程設計", q: "2. 某位高中科技教師想要以資源回收裝置作為是必修課程的專題製作活動，請問在規劃此一活動時，將下列哪一項學習內容納入「較不適切」？", opts: ["工程、科技、科學與數學的統整與應用。", "進階機電整合設計與實作。", "機構與結構的設計與應用。", "工程科技議題的探究。"], ansIndex: 1 },
    { cat: "工程設計", q: "3. 工程師必須了解需求和限制之間的差異，倘若有一群工程師被要求設計一雙孩童用的網球鞋，且金額必須低於 1000 元新台幣。他們決定若要生產與製造低於 1000 元新台幣的球鞋，那麼一定必須使用回收材料。請問，下列哪一項是這個工程團隊所遭遇的限制？", opts: ["鞋子必須專門為孩童設計。", "鞋子必須使用回收材料。", "鞋子價格必須低於新台幣 1000 元。", "鞋子必須由這群工程師團隊設計與製造。"], ansIndex: 2 },
    { cat: "工程設計", q: "4. 當針對某一個工程設計問題尋找可能的解決方法時，通常會發生什麼情形，請挑選適切的選項？", opts: ["只有一個可能正確的解決方法。", "只會有非常少數且有限制的可能解決方法。", "通常會有許多可能的解決方法。", "不會有適切的解決方法。"], ansIndex: 2 },
    { cat: "工程設計", q: "5. 通常工程師在設計產品時主要目的為何，請挑選出較爲適切者。", opts: ["科學是人類創新的舉動。", "科學重視找尋最佳的解決方案。", "科技是展現真理和事實的基本方法。", "科技是一種人類運用知識、創意和資源，以解決實務問題和改善生活環境的努力。"], ansIndex: 3 },
    { cat: "工程設計", q: "6. 下列哪一個選項常被用來評估一項設計的品質？", opts: ["建模測試的次數。", "螺旋式的設計程序。", "標準與限制。", "工程公司的規模。"], ansIndex: 2 },
    { cat: "工程設計", q: "7. 當一個工程師設計和建造一個改善汽車煞車系統的模型之後，請問工程師接下來應該採取哪一個步驟？", opts: ["確認需求與限制。", "繪製建模草圖。", "測試建模並蒐集與分析結果。", "溝通與優化設計。"], ansIndex: 2 },
    { cat: "工程設計", q: "8. Sarah想要針對一個自動化公司提出一個回收輪胎的提案構想，倘若她依循工程設計程序的話，請問她在發展提案的第一個步驟應該為何？", opts: ["針對自動化公司構思最佳的可行方案。", "建構模型。", "與自動化公司溝通以確認其問題或需求。", "針對自動化公司進行方案可行性分析。"], ansIndex: 2 },
    { cat: "工程設計", q: "9. 在進行工程設計時，功能與成本均需考量。若有兩台設備相距約 2 公尺，也會常搬動，請問哪一種通訊方式最適合？", opts: ["IIC", "藍芽", "WiFi", "Internet"], ansIndex: 1 },
    { cat: "工程設計", q: "10. 在進行機電整合相關之工程設計實作時，常會進使用舵機進行轉角控制，一般會使用哪一種介面腳位？", opts: ["UART 腳位", "數位腳位", "PWM 腳位", "IIC 腳位"], ansIndex: 2 },
    { cat: "工程設計", q: "11. 在進行機電整合相關之工程設計實作時，常會使用 3D 列印機與雷射切割機。關於兩者之描述何者「最不恰當」？", opts: ["使用雷射切割機需先學會 2D 製圖", "使用 3D 列印機需先學會 3D 製圖", "若以製作一立體物件，應選用雷射切割機，速度才較快", "雷射切割機可完成切邊、鑽孔、雕刻等工序"], ansIndex: 2 },
    { cat: "工程設計", q: "12. 工程設計評量，包含：", opts: ["學習歷程檔案", "實作評量與紙筆測驗", "作品標準參照評量", "以上皆是"], ansIndex: 3 },
    { cat: "工程設計", q: "13. 工程設計搭配 Arduino 晶片，開發產品需考慮哪些要素：", opts: ["輸出/輸入 總點數", "感測器類別", "致動器與傳動機構", "以上皆是"], ansIndex: 3 },
    { cat: "工程設計", q: "14. 依據 NGSS（Next Generation Science Standards）關於「工程設計」的敘述，下列何者「錯誤」？", opts: ["設計任務之標準與限制定義的越精確，設計出的解決方案就越有可能成功。", "發展解決方案的過程中，應該針對最初靈光乍現的構想不斷深入細緻化，以找出最佳的結果。", "應藉由系統化的測試過程，來評估解決方案是否符合問題的標準與限制。", "應透過建模來進行迭代測試與修正，進而實踐最佳的設計。"], ansIndex: 1 },
    { cat: "工程設計", q: "15. 在構思解決方案的過程中，應先擬定一組適當的設計目標，下列關於基本設計目標的敘述，何者「有誤」？", opts: ["安全：設計解決方案不應威脅生產、經銷和（或）操作人員的安全。", "環境保護：設計解決方案不應損害環境—包含從生產到使用到最終處置。", "可靠性：設計解決方案應在預期使用期限內的每次使用都能順利運行。", "使用標準件：應盡量避免使用標準件，以免影響成品品質。"], ansIndex: 3 },
    { cat: "工程設計", q: "16. 下列關於工程模型之敘述，何者正確？一個模型可以是：科學是以理解為目的，科技則以實用為目的。", opts: ["用於測試工程解決方案，具功能性的等比例縮小模型。", "描述系統變量之間關係的一組抽象方程式。", "設計方案的 2D 或 3D 設計圖。", "以上皆是"], ansIndex: 3 },
    { cat: "工程設計", q: "17. 下列關於 ITEEA 所提出之 6E 學習模式之敘述，何者正確？", opts: ["Explore 階段著重在連結先備知識，引發學習興趣。", "Explain 階段著重在建構學生自身對於問題的理解。", "Engineer 階段著重在運用概念、實務經驗與態度以發展對實作活動主題的深度理解。", "Enrich 階段著重在評量學期的成果，以深化學習經驗。"], ansIndex: 2 },
    { cat: "工程設計", q: "18. 關於工程設計流程之敘述，下列何者「有誤」？", opts: ["工程設計是在條件限制下的設計。", "原型建模目的是提供對設計及其性能更深入的了解。", "對於工程設計產品好壞的判定依據，應來自於預設的評估標準。", "對工程設計之目的在於針對問題、需求與條件限制中，找出唯一正確的解決方法。"], ansIndex: 3 },
    { cat: "工程設計", q: "19. 通常在工程設計程序中的哪一個步驟，會著重釐清目標群眾（target population or target audience）？", opts: ["確認需求。", "預測分析。", "發展可行構想。", "可行性分析。"], ansIndex: 0 },
    { cat: "工程設計", q: "20. 有一位工程師建議使用機器人系統來製造一項特殊的化學原料，請問下列哪一項理由「較不可能」是工程師提出此一建議的原因？", opts: ["降低材料成本。", "減少工人接觸化學原料的風險。", "提升生產化學原料的效率。", "增加生產成本。"], ansIndex: 3 },
    { cat: "工程設計", q: "21. 在進行機電整合設計與實作時，常需進行電子電路接線，下列敘述何者「錯誤」?", opts: ["一般接地線會用白線", "一般電源線會用紅線", "一般接地腳位會標 GND", "一般電源腳位會標+Vcc"], ansIndex: 0 },
    { cat: "工程設計", q: "22. 色碼電阻的顏色黑、棕、紅、橙、黃、綠、藍、紫、灰、白，依序代表數字 0 至 9。請問有一色碼電阻其色碼為棕、黑、紅、金，其是幾歐姆的電阻?", opts: ["100", "1K", "10K", "21K"], ansIndex: 1 },
    { cat: "工程設計", q: "23. 創客（Maker，或稱自造者）的主要特點為?", opts: ["動手創作", "動手修理", "動手做", "以上皆是"], ansIndex: 3 },

// 洗牌演算法 (Fisher-Yates Shuffle)
function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    const newArray = JSON.parse(JSON.stringify(array));
    while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [newArray[currentIndex], newArray[randomIndex]] = [newArray[randomIndex], newArray[currentIndex]];
    }
    return newArray;
}

        const shuffledOpts = shuffle(item.opts);      // 打散選項
        const newAnsIndex = shuffledOpts.indexOf(correctText); // 計算新索引
        const optKeys = ['A', 'B', 'C', 'D'];

        return {
            cat: item.cat,
            q: item.q,
            img: item.img || null, // 【修改 1】：將題庫中的圖片路徑同步帶入
            opts: shuffledOpts,
            ansKey: optKeys[newAnsIndex]
        };
    });

    const container = document.getElementById('questions-container');
    container.innerHTML = '';
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('submit-btn').style.display = 'inline-block';
    
    // 捲動到頂部
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // 3. 渲染題目至網頁
    currentQuiz.forEach((qObj, index) => {
        const qCard = document.createElement('div');
        qCard.className = 'question-card';
        qCard.id = `q-card-${index}`;

        let optionsHtml = '';
        const optKeys = ['A', 'B', 'C', 'D'];
        qObj.opts.forEach((optStr, optIdx) => {
            const key = optKeys[optIdx];
            optionsHtml += `
                <label class="option-label" id="label-${index}-${key}">
                    <input type="radio" name="q-${index}" value="${key}">
                    (${key}) ${optStr}
                </label>
            `;
        });

        // 【修改 2】：判斷是否有圖片，若有則生成 <img> HTML
        const imgHtml = qObj.img 
            ? `<div class="img-box"><img src="${qObj.img}" class="question-img" alt="題目圖片"></div>` 
            : '';

        qCard.innerHTML = `
            <div class="question-header">
                <span class="category-tag">${qObj.cat}</span>
                第 ${index + 1} 題. ${qObj.q.replace(/^\d+\.\s*/, '')}
            </div>
            <div class="options-group">
                ${optionsHtml}
            </div>
            ${imgHtml} <!-- 放在題目與選項的下方 -->
            <div class="explanation" id="exp-${index}"></div>
        `;
        container.appendChild(qCard);
    });
}

// 提交計算分數
function submitQuiz() {
    let correctCount = 0;
    let answeredCount = 0;

    currentQuiz.forEach((qObj, index) => {
        const selected = document.querySelector(`input[name="q-${index}"]:checked`);
        const expDiv = document.getElementById(`exp-${index}`);
        
        if (selected) {
            answeredCount++;
            const userAns = selected.value;
            
            if (userAns === qObj.ansKey) {
                correctCount++;
                document.getElementById(`label-${index}-${userAns}`).classList.add('correct');
                expDiv.innerHTML = `<span style="color:var(--success-color)">✓ 回答正確</span>`;
            } else {
                document.getElementById(`label-${index}-${userAns}`).classList.add('incorrect');
                document.getElementById(`label-${index}-${qObj.ansKey}`).classList.add('correct');
                expDiv.innerHTML = `<span style="color:var(--danger-color)">✗ 回答錯誤！正確答案為 (${qObj.ansKey})</span>`;
            }
        } else {
            document.getElementById(`label-${index}-${qObj.ansKey}`).classList.add('correct');
            expDiv.innerHTML = `<span style="color:var(--danger-color)">未作答！正確答案為 (${qObj.ansKey})</span>`;
        }

        // 鎖定所有選項
        const inputs = document.querySelectorAll(`input[name="q-${index}"]`);
        inputs.forEach(input => input.disabled = true);
    });

    // 計算總分
    const score = correctCount === 30 ? 100 : Math.round(correctCount * (100 / 30));

    // 顯示成果
    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `
        <div class="score-box">
            測驗結束！您的總分為：<span style="color:var(--primary-color); font-size: 1.5em;">${score}</span> / 100 分
            <br>
            <span style="font-size:0.8em; font-weight:normal; color:#666;">
                (共 30 題，已答 ${answeredCount} 題，答對 ${correctCount} 題)
            </span>
        </div>
    `;

    document.getElementById('submit-btn').style.display = 'none';
    resultArea.scrollIntoView({ behavior: 'smooth' });
}

// 頁面載入時自動初始化
window.onload = initQuiz;
</script>

</html>
